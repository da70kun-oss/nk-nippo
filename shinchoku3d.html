<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>川崎｜進捗</title>
<style>
  :root{--ink:#22282c;--paper:#f4f3ef;--card:#fff;--line:#ddd9d1;--green:#4f6f5e;
    --mute:#83878a;--sumi:#b9b4aa;--amber:#c99a4b}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    background:var(--paper);color:var(--ink);overflow:hidden}
  .page{position:fixed;inset:0 0 62px 0;overflow-y:auto;display:none;padding:16px 14px 24px}
  .page.on{display:block}
  #pg-zumen{padding:0;overflow:hidden}
  h1{font-size:14px;font-weight:700;letter-spacing:.1em}
  .sub{font-size:10.5px;color:var(--mute);margin-bottom:10px}
  .tabs{position:fixed;left:0;right:0;bottom:0;height:62px;display:flex;
    background:var(--card);border-top:1px solid var(--line)}
  .tab{flex:1;border:none;background:none;font-family:inherit;font-size:12px;
    font-weight:700;letter-spacing:.06em;color:var(--mute);cursor:pointer}
  .tab.on{color:var(--green)}
  .tab .dot{display:block;width:5px;height:5px;border-radius:50%;margin:4px auto 0;background:transparent}
  .tab.on .dot{background:var(--green)}
  .hud{position:fixed;left:14px;top:12px;pointer-events:none;z-index:2}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;
    -webkit-overflow-scrolling:touch}
  .chip{flex:none;padding:9px 13px;font-size:12.5px;font-family:inherit;color:var(--ink);
    border:1px solid var(--line);border-radius:999px;background:var(--card);cursor:pointer}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green);font-weight:700}
  .mode{display:flex;gap:8px;margin-bottom:10px}
  .mbtn{flex:1;padding:11px;font-size:13.5px;font-weight:700;font-family:inherit;
    border:1.5px solid var(--line);border-radius:11px;background:var(--card);color:var(--mute);cursor:pointer}
  .mbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .legend{display:flex;gap:12px;font-size:10.5px;color:var(--mute);margin-bottom:10px}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:4px;
    vertical-align:-1px;border:1px solid var(--line)}
  .floor{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .fl{width:34px;font-size:11px;font-weight:700;color:var(--mute);text-align:right;flex:none}
  .cells{display:flex;gap:5px;flex:1}
  .cell{flex:1;height:36px;border-radius:8px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;font-size:10.5px;font-weight:700;
    color:var(--mute);font-family:inherit}
  .cell.on{color:#fff}
  .badge{position:fixed;right:12px;top:12px;z-index:5;font-size:11px;font-weight:700;
    letter-spacing:.06em;padding:7px 13px;border-radius:999px;background:var(--card);
    border:1px solid var(--line);color:var(--mute)}
  .badge.edit{background:var(--green);color:#fff;border-color:var(--green)}
  /* 材料台帳 */
  .zpanel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:10px}
  .zpanel h2{font-size:12.5px;font-weight:700;letter-spacing:.05em;margin-bottom:10px;color:var(--green)}
  .zrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .zrow label{display:block;font-size:11px;color:var(--mute);margin-bottom:4px}
  .zrow input,.zrow select{width:100%;padding:11px 12px;font-size:16px;border:1px solid var(--line);
    border-radius:10px;background:var(--paper);color:var(--ink);font-family:inherit;appearance:none}
  .zchips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
  .zchip{padding:9px 13px;font-size:13px;font-family:inherit;color:var(--ink);
    border:1px solid var(--line);border-radius:999px;background:var(--paper);cursor:pointer}
  .zchip.on{background:var(--green);color:#fff;border-color:var(--green);font-weight:700}
  .zbtn{width:100%;padding:13px;font-size:14px;font-weight:700;letter-spacing:.08em;border:none;
    border-radius:11px;background:var(--green);color:#fff;font-family:inherit;cursor:pointer}
  #zsum,#ztheory table{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums}
  #zsum th,#ztheory th{font-size:10px;color:var(--mute);text-align:right;padding:6px 4px;border-bottom:1.5px solid var(--green)}
  #zsum th:first-child{text-align:left}
  #zsum td,#ztheory td{padding:7px 4px;text-align:right;border-bottom:1px dashed var(--line)}
  #zsum td:first-child{text-align:left;font-weight:700}
  .zan{color:var(--green);font-weight:700}.neg{color:var(--liq);font-weight:700}
  .zlog{display:flex;align-items:center;gap:8px;padding:8px 2px;border-bottom:1px solid var(--line);font-size:12.5px}
  .ztag{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700}
  .ztag.in{background:var(--green-soft);color:var(--green)}.ztag.out{background:var(--liq-soft);color:var(--liq)}
  .zdel{background:none;border:none;color:#c6c2ba;font-size:18px;padding:2px 8px;cursor:pointer}
</style>
</head>
<body>

<div class="badge" id="badge">閲覧モード</div>
<div class="page on" id="pg-zumen">
  <div class="hud"><h1>図　面</h1><div class="sub">打込済＝緑・一部＝橙・撤去済のみ＝薄墨</div></div>
  <div id="wrap"></div>
</div>

<div class="page" id="pg-s"></div>
<div class="page" id="pg-e"></div>
<div class="page" id="pg-w"></div>
<div class="page" id="pg-n"></div>

<div class="page" id="pg-z">
  <h1>材　料　台　帳</h1>
  <div class="sub">搬入・払出を記録（金額なし）</div>
  <div class="zpanel">
    <h2>記録する</h2>
    <div class="zrow">
      <div><label>日付</label><input type="date" id="zDate"></div>
      <div><label>数量</label><input type="number" id="zQty" inputmode="decimal" placeholder="10"></div>
    </div>
    <label style="font-size:11px;color:var(--mute)">区分</label>
    <div class="zchips" id="zKubun">
      <button type="button" class="zchip on" data-v="搬入">搬入</button>
      <button type="button" class="zchip" data-v="払出">払出</button>
      <button type="button" class="zchip" data-v="返品">返品</button>
    </div>
    <div id="zDestRow" style="display:none">
      <label style="font-size:11px;color:var(--mute)">払出先</label>
      <div class="zchips" id="zDest">
        <button type="button" class="zchip on" data-v="うち">うち</button>
        <button type="button" class="zchip" data-v="将和">将和</button>
        <button type="button" class="zchip" data-v="その他">その他</button>
      </div>
    </div>
    <div class="zrow" style="grid-template-columns:1fr">
      <div><label>材料</label><select id="zMat"></select></div>
    </div>
    <div class="zrow" style="grid-template-columns:1fr">
      <div><label>メモ（階・部位・受領者など 任意）</label><input type="text" id="zMemo" placeholder="10F廊下 じゅん"></div>
    </div>
    <button class="zbtn" id="zAdd">記録する</button>
  </div>
  <div class="zpanel"><h2>集計（在庫と払出先）</h2><table id="zsum"></table></div>
  <div class="zpanel">
    <h2>予測必要量</h2>
    <div id="ztheory"></div>
  </div>
  <div class="zpanel"><h2>履歴（直近）</h2><div id="zlogList"><div class="sub">記録なし</div></div></div>
</div>

<div class="tabs">
  <button class="tab on" data-p="zumen">図面<span class="dot"></span></button>
  <button class="tab" data-p="s">南<span class="dot"></span></button>
  <button class="tab" data-p="e">東<span class="dot"></span></button>
  <button class="tab" data-p="w">西<span class="dot"></span></button>
  <button class="tab" data-p="n">廊下<span class="dot"></span></button>
  <button class="tab" data-p="z">材料<span class="dot"></span></button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  // ===== Firebase設定：コンソール→プロジェクトの設定→マイアプリ→構成 をここに貼る =====
  var firebaseConfig={
    apiKey:"AIzaSyAv2lpFT0J3JXG9DRaV4u-QA-D3JOKnCXo",
    authDomain:"sealing-sample1.firebaseapp.com",
    projectId:"sealing-sample1",
    storageBucket:"sealing-sample1.firebasestorage.app",
    messagingSenderId:"161111837544",
    appId:"1:161111837544:web:b4f06b692369a0f153e4dd"
  };
  // 編集キー：URLが「…html#key=あいことば」の時だけ編集可（キー自体の照合はFirestoreルール側）
  var EDIT_KEY=(location.hash.match(/key=([^&]+)/)||[])[1]||'';
  var canEdit=!!EDIT_KEY;
  var badge=null;

  var KEY='kawasaki-face2';
  var rec={};
  try{rec=JSON.parse(localStorage.getItem(KEY))||{};}catch(e){}

  var db=null, docRef=null, pushTimer=null, applying=false;
  if(firebaseConfig.apiKey){
    firebase.initializeApp(firebaseConfig);
    db=firebase.firestore();
    docRef=db.collection('kawasaki').doc('shinchoku');
    docRef.onSnapshot(function(snap){
      var d=snap.data();
      if(!d||!d.rec) return;
      applying=true;
      rec=d.rec;
      try{localStorage.setItem(KEY,JSON.stringify(rec));}catch(e){}
      if(window.__redrawAll) window.__redrawAll();
      applying=false;
    });
  }
  function save(){
    try{localStorage.setItem(KEY,JSON.stringify(rec));}catch(e){}
    if(docRef&&canEdit&&!applying){
      clearTimeout(pushTimer);
      pushTimer=setTimeout(function(){
        docRef.set({rec:rec,k:EDIT_KEY,t:Date.now()}).catch(function(){
          if(badge){badge.textContent='編集権限なし';badge.classList.remove('edit');}
        });
      },400);
    }
  }
  function bag(face,part,mode){var k=face+'_'+part+'_'+mode; rec[k]=rec[k]||{}; return rec[k];}

  var ALL=[],F212=[],F1315=[15,14,13];
  for(var ff=15;ff>=2;ff--){ALL.push(ff); if(ff<=12)F212.push(ff);}
  function roomsOf(f){return f>=15?2:f>=13?6:8;}
  function lab(f){return f===14?'14F　L型バルコニー':f+'F　ルーフバルコニー';}

  // 妻面の並び（南角→サッシ2枚→SB→サッシ→廊下側角）＋横目地（各階上下2本）＋上部（13〜15F）
  var TSUMA=[
    {n:'出窓（南側）',fl:F212},
    {n:'出窓（中央）',fl:F212},
    {n:'SB 掃き出しサッシ',fl:F212},
    {n:'SB 目地（有無未確認）',fl:F212},
    {n:'横目地（上下2本）',fl:F212},
    {n:'ルーフ・L型（13〜15F）',fl:F1315,special:1}
  ];
  var FACES={
    s:{title:'バルコニー面（南）',kind:'rooms',
       parts:[{n:'バルコニー',fl:ALL},{n:'サッシ',fl:ALL},{n:'天井',fl:ALL},
              {n:'目地',fl:ALL},{n:'ウレタン目地',fl:ALL},{n:'外壁',fl:ALL}]},
    e:{title:'妻面（東）',kind:'floor',parts:TSUMA},
    w:{title:'妻面（西）',kind:'floor',parts:TSUMA},
    n:{title:'廊下面（北）',kind:'floor',
       parts:[{n:'サッシ廻り',fl:ALL},{n:'建具・MB',fl:ALL},
              {n:'設備廻り',fl:ALL},{n:'タイル目地',fl:ALL}]}
  };
  var state={s:{parts:[0],mode:'u'},e:{parts:[0],mode:'u'},w:{parts:[0],mode:'u'},n:{parts:[0],mode:'u'}};

  Object.keys(FACES).forEach(function(face){
    var cfg=FACES[face], pg=document.getElementById('pg-'+face);
    var chips='';
    cfg.parts.forEach(function(p,i){
      chips+='<button class="chip'+(i===0?' on':'')+'" data-i="'+i+'">'+p.n+'</button>';
    });
    pg.innerHTML='<h1>'+cfg.title+'</h1>'
      +'<div class="sub">①部位（複数可）②撤去/打込み ③終わった所をタップ</div>'
      +'<div class="chips">'+chips+'</div>'
      +'<div class="mode"><button class="mbtn" data-m="t">撤去</button>'
      +'<button class="mbtn on" data-m="u">打込み</button></div>'
      +'<div class="legend"><span><i style="background:var(--card)"></i>未</span>'
      +'<span><i style="background:var(--sumi)"></i>撤去済</span>'
      +'<span><i style="background:var(--green)"></i>打込済</span></div>'
      +'<div class="grid"></div>';

    pg.querySelector('.chips').addEventListener('click',function(ev){
      var b=ev.target.closest('.chip'); if(!b)return;
      var i=parseInt(b.getAttribute('data-i'),10), arr=state[face].parts;
      var at=arr.indexOf(i);
      if(at>=0){ if(arr.length>1){arr.splice(at,1); b.classList.remove('on');} }
      else { arr.push(i); b.classList.add('on'); }
      draw(face);
    });
    pg.querySelector('.mode').addEventListener('click',function(ev){
      var b=ev.target.closest('.mbtn'); if(!b)return;
      this.querySelectorAll('.mbtn').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on'); state[face].mode=b.getAttribute('data-m');
      draw(face);
    });
    pg.querySelector('.grid').addEventListener('click',function(ev){
      if(!canEdit) return;
      var b=ev.target.closest('.cell'); if(!b)return;
      var st=state[face], id=b.getAttribute('data-id');
      // 先頭部位の状態を基準にトグル→選択中の全部位を揃える
      var lead=cfg.parts[st.parts[0]], leadBag=bag(face,lead.n,st.mode);
      var turnOn=!leadBag[id];
      st.parts.forEach(function(pi){
        var part=cfg.parts[pi]; if(!part) return;
        var done=bag(face,part.n,st.mode);
        if(turnOn) done[id]=1; else delete done[id];
      });
      save(); draw(face); paint();
    });
  });

  function draw(face){
    var cfg=FACES[face], st=state[face];
    var col=st.mode==='t'?'var(--sumi)':'var(--green)';
    // 選択中の全部位に共通する階集合（複数部位でfl範囲が違う場合は先頭部位のflを使う）
    var lead=cfg.parts[st.parts[0]];
    var bags=st.parts.map(function(pi){return bag(face,cfg.parts[pi].n,st.mode);});
    function allOn(id){return bags.every(function(bg){return !!bg[id];});}
    var h='';
    lead.fl.forEach(function(f){
      var cells='';
      if(cfg.kind==='rooms'){
        for(var r=1;r<=roomsOf(f);r++){
          var id=f+'-'+r, on=allOn(id)?1:0;
          cells+='<button class="cell'+(on?' on':'')+'" data-id="'+id+'"'
            +(on?' style="background:'+col+';border-color:'+col+'"':'')
            +'>'+f+'0'+r+'</button>';
        }
      }else{
        var id2=''+f, on2=allOn(id2)?1:0;
        var txt=lead.special?lab(f):f+'F';
        cells='<button class="cell'+(on2?' on':'')+'" data-id="'+id2+'"'
          +(on2?' style="background:'+col+';border-color:'+col+'"':'')
          +'>'+txt+'</button>';
      }
      h+='<div class="floor"><span class="fl">'+f+'F</span><div class="cells">'+cells+'</div></div>';
    });
    document.querySelector('#pg-'+face+' .grid').innerHTML=h;
  }
  Object.keys(FACES).forEach(draw);

  var curPage='zumen';
  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      curPage=this.getAttribute('data-p');
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
      this.classList.add('on');
      document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
      document.getElementById('pg-'+curPage).classList.add('on');
    });
  });

  // ===== 3D =====
  var W=window.innerWidth,H=window.innerHeight-62;
  var scene=new THREE.Scene(); scene.background=new THREE.Color(0xf4f3ef);
  var camera=new THREE.PerspectiveCamera(45,W/H,0.1,1000);
  var renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(W,H);
  document.getElementById('wrap').appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0xffffff,0.8));
  var sun=new THREE.DirectionalLight(0xfff8ec,0.55); sun.position.set(60,90,40); scene.add(sun);
  var ground=new THREE.Mesh(new THREE.CircleGeometry(160,48),new THREE.MeshLambertMaterial({color:0xe9e7e0}));
  ground.rotation.x=-Math.PI/2; scene.add(ground);

  var RW=6.4,D=12,FH=3,totalW=8*RW;
  var GRAY=0xdedbd3, GREEN=0x4f6f5e, AMBER=0xc99a4b, SUMI=0xb9b4aa;
  var bldg=new THREE.Group(); scene.add(bldg);
  var WHITE=0xf2f1ec, JOINT=0x74787c;
  function box(w,h,d,x,y,z,base){
    var c=(base===undefined)?GRAY:base;
    var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshLambertMaterial({color:c}));
    m.userData.base=c;
    m.position.set(x,y,z); bldg.add(m); return m;
  }
  var M={s:{},e:{},w:{},n:{}};
  function reg(face,part,f,m){
    M[face][part]=M[face][part]||{}; M[face][part][f]=M[face][part][f]||[];
    M[face][part][f].push(m);
  }
  var base=new THREE.Mesh(new THREE.BoxGeometry(totalW,FH,D),new THREE.MeshLambertMaterial({color:0xd2cfc7}));
  base.position.set(0,FH/2,0); bldg.add(base);

  ALL.forEach(function(f){
    var w=roomsOf(f)*RW, y=(f-1)*FH+FH/2;
    reg('s','外壁',f, box(w,FH,D,0,y,0));
    reg('s','バルコニー',f, box(w,FH*0.42,0.5,0,y-FH*0.22,D/2+0.3));
    reg('s','サッシ',f, box(w*0.94,FH*0.4,0.12,0,y+FH*0.2,D/2+0.07,WHITE));
    reg('s','天井',f, box(w,0.16,1.4,0,y+FH/2-0.08,D/2+0.7));
    for(var k=1;k<roomsOf(f);k++) reg('s','目地',f, box(0.14,FH,0.1,-w/2+RW*k,y,D/2+0.02,JOINT));
    reg('s','ウレタン目地',f, box(w,0.14,0.56,0,y,D/2+0.31,JOINT));
    reg('n','サッシ廻り',f, box(w,FH*0.34,0.12,0,y+FH*0.18,-(D/2+0.07),WHITE));
    reg('n','建具・MB',f, box(w*0.6,FH*0.42,0.12,0,y-FH*0.2,-(D/2+0.07)));
    reg('n','設備廻り',f, box(w*0.25,FH*0.2,0.12,w*0.3,y,-(D/2+0.07)));
    reg('n','タイル目地',f, box(w,0.14,0.12,0,y-FH/2+0.1,-(D/2+0.07),JOINT));

    // 妻面（2F〜12F・両妻で鏡映し）：南角→サッシ2枚→SB→サッシ→廊下側角
    if(f<=12){
      [['e',1],['w',-1]].forEach(function(a){
        var face=a[0], sgn=a[1], gx=sgn*(w/2+0.10);
        // 妻面（単純化）：平らな壁に 窓・窓・SB を順に並べるだけ。曲面なし
        reg(face,'出窓（南側）',f,        box(0.3,FH*0.6,1.6, sgn*(w/2+0.16), y, 3.6, WHITE));
        reg(face,'出窓（中央）',f,        box(0.3,FH*0.6,1.6, sgn*(w/2+0.16), y, 0.8, WHITE));
        reg(face,'SB 掃き出しサッシ',f,   box(0.3,FH*0.72,1.6, sgn*(w/2+0.16), y-FH*0.05, -2.0, WHITE));
        reg(face,'SB 目地（有無未確認）',f, box(0.18,FH*0.5,0.14, sgn*(w/2+0.12), y, -3.2, JOINT));
        box(0.28,FH*0.6,1.4, sgn*(w/2+0.15), y, -D/2+1.1, 0xefede7);   // 廊下寄り窓＝範囲外
        reg(face,'横目地（上下2本）',f, box(0.16,0.14,D*0.72, gx, y-FH/2+0.22, 0.4, JOINT));
        reg(face,'横目地（上下2本）',f, box(0.16,0.14,D*0.72, gx, y+FH/2-0.22, 0.4, JOINT));
      });
    }
  });
  // 上部（両妻）：13Fルーフ／14F L型／15Fルーフ（部屋数：15F=2・14F/13F=6・12F以下=8）
  [['e',1],['w',-1]].forEach(function(a){
    var face=a[0], sgn=a[1];
    var e12=8*RW/2, e13=6*RW/2, e15=2*RW/2;
    reg(face,'ルーフ・L型（13〜15F）',13,
      box(Math.max(e12-e13-0.4,0.5),FH*0.36,D,sgn*((e12+e13)/2),12*FH+FH*0.18,0));
    reg(face,'ルーフ・L型（13〜15F）',14,
      box(0.5,FH*0.36,D*0.7,sgn*(e13-0.3),13*FH+FH*0.18,D*0.1));
    reg(face,'ルーフ・L型（13〜15F）',15,
      box(Math.max(e13-e15-0.4,0.5),FH*0.36,D,sgn*((e13+e15)/2),14*FH+FH*0.18,0));
  });

  function paint(){
    Object.keys(FACES).forEach(function(face){
      var cfg=FACES[face];
      cfg.parts.forEach(function(part){
        var du=bag(face,part.n,'u'), dt=bag(face,part.n,'t');
        part.fl.forEach(function(f){
          var meshes=(M[face][part.n]||{})[f]; if(!meshes)return;
          var tot,uc,tc;
          if(cfg.kind==='rooms'){
            tot=roomsOf(f); uc=0; tc=0;
            for(var r=1;r<=tot;r++){var id=f+'-'+r; if(du[id])uc++; if(dt[id])tc++;}
          }else{tot=1; uc=du[''+f]?1:0; tc=dt[''+f]?1:0;}
          meshes.forEach(function(m){
            var c = uc>=tot?GREEN : uc>0?AMBER : tc>=tot?SUMI : (m.userData.base!==undefined?m.userData.base:GRAY);
            m.material.color.setHex(c);
          });
        });
      });
    });
  }
  paint();
  window.__redrawAll=function(){Object.keys(FACES).forEach(draw);paint();};
  badge=document.getElementById('badge');
  if(canEdit){badge.textContent='編集モード';badge.classList.add('edit');}

  var target=new THREE.Vector3(0,22,0),theta=0.9,phi=1.15,dist=100,spin=true;
  function updateCam(){
    phi=Math.max(0.25,Math.min(1.45,phi)); dist=Math.max(35,Math.min(220,dist));
    camera.position.set(target.x+dist*Math.sin(phi)*Math.sin(theta),
      target.y+dist*Math.cos(phi),target.z+dist*Math.sin(phi)*Math.cos(theta));
    camera.lookAt(target);
  }
  var dragging=false,px=0,py=0,pinch=0,el=renderer.domElement;
  el.addEventListener('pointerdown',function(e){dragging=true;spin=false;px=e.clientX;py=e.clientY;});
  window.addEventListener('pointermove',function(e){
    if(!dragging)return;
    theta-=(e.clientX-px)*0.006; phi-=(e.clientY-py)*0.004; px=e.clientX;py=e.clientY;});
  window.addEventListener('pointerup',function(){dragging=false;});
  el.addEventListener('wheel',function(e){e.preventDefault();dist*=(1+e.deltaY*0.001);},{passive:false});
  el.addEventListener('touchstart',function(e){
    if(e.touches.length===2)pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    if(e.touches.length===2){
      var d2=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(pinch>0)dist*=pinch/d2; pinch=d2;}
  },{passive:true});
  window.addEventListener('resize',function(){
    W=window.innerWidth;H=window.innerHeight-62;
    camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);});
  (function loop(){requestAnimationFrame(loop);
    if(curPage==='zumen'){if(spin)theta+=0.003;updateCam();renderer.render(scene,camera);}})();

  // ================= 材料台帳（Firestore同期・編集キー共通） =================
  (function(){
    var ZKEY='kawasaki-zairyo';
    var MATS=['MS2500(4L)','PU9000(4L)','PS169N(4L)','MS2500ｶｰﾄﾘｯｼﾞ','プライマー','バッカー20×5','マスキング','ウエス・溶剤','その他'];
    var DESTS=['うち','将和','その他'];
    var THEORY=[
      ['外壁タイル目地（縦）',210,20,15,'MS2500(4L)',true],
      ['外壁打継目地（横）',1465,20,15,'MS2500(4L)',true],
      ['手摺内壁目地',178,20,15,'PU9000(4L)',true],
      ['天井目地',229,20,15,'PU9000(4L)',true],
      ['AWサッシ廻り',2490,15,10,'MS2500(4L)',false],
      ['床端末シール',1155,20,10,'MS2500(4L)',false],
      ['Rサッシ端末',10.5,20,10,'MS2500(4L)',false]
    ];
    var zlog=[];
    try{zlog=JSON.parse(localStorage.getItem(ZKEY))||[];}catch(e){}
    var $=function(id){return document.getElementById(id);};
    function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
    function fmt(n){return n.toLocaleString('ja-JP',{maximumFractionDigits:1});}

    // Firestore：kawasaki/zairyo ドキュメント（進捗とは別）
    var zRef=null, zTimer=null, zApplying=false;
    if(db){
      zRef=db.collection('kawasaki').doc('zairyo');
      zRef.onSnapshot(function(snap){
        var d=snap.data(); if(!d||!d.log) return;
        zApplying=true; zlog=d.log;
        try{localStorage.setItem(ZKEY,JSON.stringify(zlog));}catch(e){}
        render(); zApplying=false;
      });
    }
    function zsave(){
      try{localStorage.setItem(ZKEY,JSON.stringify(zlog));}catch(e){}
      if(zRef&&canEdit&&!zApplying){
        clearTimeout(zTimer);
        zTimer=setTimeout(function(){zRef.set({log:zlog,k:EDIT_KEY,t:Date.now()}).catch(function(){});},400);
      }
    }

    // 材料セレクト
    var sel=$('zMat'); MATS.forEach(function(m){var o=document.createElement('option');o.value=m;o.textContent=m;sel.appendChild(o);});
    $('zDate').value=today();

    function chip(id){var b=document.querySelector('#'+id+' .zchip.on');return b?b.getAttribute('data-v'):'';}
    function bindZ(id){$(id).addEventListener('click',function(ev){
      var b=ev.target.closest('.zchip');if(!b)return;
      this.querySelectorAll('.zchip').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');
      if(id==='zKubun')$('zDestRow').style.display=(b.getAttribute('data-v')==='払出')?'block':'none';
    });}
    bindZ('zKubun'); bindZ('zDest');

    function sum(mat,kubun,dest){var s=0;zlog.forEach(function(e){
      if(e.mat!==mat||e.kubun!==kubun)return; if(dest&&e.dest!==dest)return; s+=e.qty;});return s;}

    function render(){
      var h='<tr><th>材料</th><th>搬入</th><th>うち</th><th>将和</th><th>他</th><th>残</th></tr>';
      MATS.forEach(function(m){
        var nyu=sum(m,'搬入'),hen=sum(m,'返品');
        var outs=DESTS.map(function(d){return sum(m,'払出',d);});
        var total=outs.reduce(function(a,b){return a+b;},0);
        if(nyu===0&&total===0&&hen===0)return;
        var zan=nyu-total+hen;
        h+='<tr><td>'+m+'</td><td>'+fmt(nyu)+'</td>'
          +outs.map(function(v,i){return '<td'+(i===1&&v>0?' class="neg"':'')+'>'+(v?fmt(v):'—')+'</td>';}).join('')
          +'<td class="'+(zan<0?'neg':'zan')+'">'+fmt(zan)+'</td></tr>';
      });
      $('zsum').innerHTML=h;

      var loss=1.2, need={};
      THEORY.forEach(function(t){need[t[4]]=(need[t[4]]||0)+t[1]*t[2]*t[3]/1000*loss;});
      var th='<table><tr><th>材料</th><th>予測必要缶数</th></tr>';
      Object.keys(need).forEach(function(m){
        th+='<tr><td style="text-align:left;font-weight:700">'+m+'</td><td>'+Math.ceil(need[m]/4)+'</td></tr>';
      });
      th+='</table>';
      $('ztheory').innerHTML=th;

      var list=$('zlogList');
      if(zlog.length===0){list.innerHTML='<div class="sub">記録なし</div>';}
      else{
        var lh='';
        zlog.slice().reverse().slice(0,30).forEach(function(e){
          var idx=zlog.indexOf(e);
          lh+='<div class="zlog"><span style="color:var(--mute);min-width:38px">'+e.date.slice(5).replace('-','/')+'</span>'
            +'<span class="ztag '+(e.kubun==='払出'?'out':'in')+'">'+e.kubun+(e.dest?'・'+e.dest:'')+'</span>'
            +'<span style="flex:1">'+e.mat+(e.memo?'｜<span style="color:var(--mute);font-size:11px">'+e.memo+'</span>':'')+'</span>'
            +'<span style="font-weight:700">'+fmt(e.qty)+'</span>'
            +(canEdit?'<button class="zdel" data-i="'+idx+'">×</button>':'')+'</div>';
        });
        list.innerHTML=lh;
        list.querySelectorAll('.zdel').forEach(function(b){b.addEventListener('click',function(){
          zlog.splice(parseInt(this.getAttribute('data-i'),10),1);zsave();render();});});
      }
    }

    $('zAdd').addEventListener('click',function(){
      if(!canEdit){alert('閲覧モードです（編集はキー付きURLから）');return;}
      var qty=parseFloat($('zQty').value); if(isNaN(qty)||qty<=0){$('zQty').focus();return;}
      var kubun=chip('zKubun');
      zlog.push({date:$('zDate').value||today(),kubun:kubun,dest:kubun==='払出'?chip('zDest'):'',
        mat:$('zMat').value,qty:qty,memo:$('zMemo').value.trim()});
      zsave(); render(); $('zQty').value='';$('zMemo').value='';
    });
    render();
  })();

})();
</script>
</body>
</html>
