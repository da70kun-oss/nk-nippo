<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バルコニー 軟化・液状化 日報</title>
<style>
:root{
  --bg:#f2f0ea; --card:#ffffff; --ink:#1f2a26; --green:#2f5245;
  --red:#b5442f; --muted:#8a938e; --line:#2f5245; --soft:#e7ece7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  padding:14px 12px 60px;max-width:560px;margin:0 auto}
.card{background:var(--card);border-radius:22px;padding:20px 18px;margin-bottom:14px;
  border:1px solid rgba(47,82,69,.08)}
h2{font-size:15px;color:var(--green);font-weight:700;margin-bottom:12px}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
input,textarea{width:100%;font-size:16px;padding:10px 12px;border:1.5px solid var(--soft);
  border-radius:12px;background:#fbfbf9;font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:var(--green)}
.row2{display:flex;gap:10px}.row2>div{flex:1}
.btn{display:block;width:100%;background:var(--green);color:#fff;border:none;
  border-radius:14px;padding:15px;font-size:17px;font-weight:700;margin-top:16px;font-family:inherit}
.btn:active{opacity:.85}
.btn-line{background:none;border:1.5px solid var(--green);color:var(--green);
  border-radius:14px;padding:13px;font-size:15px;font-weight:700;flex:1;font-family:inherit}
.btnrow{display:flex;gap:10px;margin-bottom:14px}
/* 日報カード */
.nippo-head{display:flex;justify-content:space-between;align-items:flex-start}
.nippo-title{font-size:18px;font-weight:800}
.tag{display:inline-block;background:var(--green);color:#fff;font-size:11px;font-weight:700;
  border-radius:6px;padding:2px 8px;vertical-align:2px;margin-left:6px}
.nippo-date{font-size:34px;font-weight:800;line-height:1}
.nippo-site{font-size:12px;color:var(--muted);margin-top:4px}
.rule{border:none;border-top:2.5px solid var(--green);margin:12px 0 14px}
.entry{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap}
.entry .floors{font-size:22px;font-weight:800}
.entry .part{font-size:14px;color:var(--muted)}
.entry .m{font-size:18px;font-weight:700}
.entry .liq{font-size:18px;font-weight:800;color:var(--red)}
.memo{font-size:13px;color:var(--muted);margin-top:6px;border-top:1px dashed #d8ddd8;padding-top:6px}
.sumbox{background:#eaf1ec;border-radius:14px;padding:14px 16px;margin-top:14px;text-align:right}
.sumbox .lbl{font-size:12px;color:var(--muted);display:inline-block;margin-left:22px}
.sumbox .v{font-size:30px;font-weight:800}
.sumbox .v.red{color:var(--red)}
.sumbox .unit{font-size:14px;font-weight:400;color:var(--muted)}
.credit{text-align:right;font-size:11.5px;color:var(--muted);margin-top:10px}
/* 累計 */
.totgrid{display:flex;gap:10px}
.tot{flex:1;border:1.5px solid var(--soft);border-radius:14px;padding:12px 14px}
.tot .lbl{font-size:12px;color:var(--muted)}
.tot .v{font-size:28px;font-weight:800}
.tot .v.red{color:var(--red)}
/* 工区進捗（内部） */
.bar{background:#e8e6df;border-radius:99px;height:14px;overflow:hidden;margin:8px 0 4px}
.bar i{display:block;height:100%;background:var(--red);border-radius:99px}
.small{font-size:12px;color:var(--muted)}
.target input{width:90px;display:inline-block;padding:6px 8px;font-size:14px;margin:0 6px}
.secnote{font-size:12px;color:var(--muted);margin-bottom:10px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:20px 0}
</style>
</head>
<body>

<div class="card">
  <h2>入力（バルコニー・サッシ廻り）</h2>
  <label>日付</label>
  <input type="date" id="inDate">
  <label>階・範囲（例：11F〜9F 東側）</label>
  <input type="text" id="inRange" placeholder="11F〜9F">
  <div class="row2">
    <div><label>軟化 m</label><input type="number" id="inM" inputmode="decimal" placeholder="0"></div>
    <div><label>うち液状化 m</label><input type="number" id="inLiq" inputmode="decimal" placeholder="0"></div>
  </div>
  <div class="row2">
    <div><label>人数</label><input type="number" id="inPpl" inputmode="numeric" placeholder="0"></div>
    <div><label>メモ（任意）</label><input type="text" id="inMemo" placeholder=""></div>
  </div>
  <button class="btn" id="btnAdd">追加する</button>
</div>

<div class="card"><h2>日報カード（この下をスクショしてLINEへ）</h2></div>

<div class="card" id="nippoCard">
  <div class="nippo-head">
    <div>
      <div class="nippo-title">軟化・液状化 日報<span class="tag">バルコニー</span></div>
      <div class="nippo-site">ダイアパレスグランデージ川崎多摩川リバーウィングス</div>
    </div>
    <div class="nippo-date" id="cardDate">–/–</div>
  </div>
  <hr class="rule">
  <div id="cardBody"><div class="empty">この日の記録はありません</div></div>
  <div class="sumbox">
    <span class="lbl">軟化 計</span> <span class="v" id="sumM">0</span><span class="unit">m</span>
    <span class="lbl">うち液状化</span> <span class="v red" id="sumLiq">0</span><span class="unit">m</span>
  </div>
  <div class="credit">有限会社石井商事｜撤去時実測</div>
</div>

<div class="btnrow">
  <button class="btn-line" id="btnCopy">テキストをコピー</button>
  <button class="btn-line" id="btnPrev">前の日を見る</button>
  <button class="btn-line" id="btnNext">次の日</button>
</div>

<div class="card">
  <h2>累計（全期間）</h2>
  <div class="totgrid">
    <div class="tot"><div class="lbl">軟化 累計</div><div class="v" id="totM">0<span class="unit" style="font-size:14px"> m</span></div></div>
    <div class="tot"><div class="lbl">液状化 累計</div><div class="v red" id="totLiq">0<span class="unit" style="font-size:14px"> m</span></div></div>
  </div>
</div>

<div class="card">
  <h2>①工区 サッシ進捗（内部メモ・スクショ範囲外）</h2>
  <div class="secnote target">目標
    <input type="number" id="inTarget" inputmode="numeric"> m（7/25打ち切り）
  </div>
  <div class="bar"><i id="barFill" style="width:0%"></i></div>
  <div class="small"><span id="barText">0m ／ 0m</span></div>
</div>

<script>
(function(){
  var KEY='balcony_nippo_v1', TKEY='balcony_target_v1';
  var mem={}, memT='1000';
  function lsGet(k,fb){try{var v=localStorage.getItem(k);return v!==null?v:fb}catch(e){return k===KEY?(mem._d||fb):(memT||fb)}}
  function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){if(k===KEY)mem._d=v;else memT=v}}

  function load(){try{return JSON.parse(lsGet(KEY,'{}'))||{}}catch(e){return{}}}
  function save(d){lsSet(KEY,JSON.stringify(d))}

  var data=load();
  var dates=function(){return Object.keys(data).sort()};
  var today=new Date(); 
  function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
  var cur = dates().length ? dates()[dates().length-1] : iso(today);

  var $=function(id){return document.getElementById(id)};
  $('inDate').value=iso(today);
  $('inTarget').value=lsGet(TKEY,'1000');

  function md(isoStr){var p=isoStr.split('-');return (+p[1])+'/'+(+p[2])}
  function fmt(n){return Number(n||0).toLocaleString('ja-JP')}

  function render(){
    var e=data[cur];
    $('cardDate').textContent=md(cur);
    if(e){
      var h='<div class="entry"><span class="floors">'+esc(e.range||'—')+'</span>'+
        '<span class="part">サッシ廻り'+(e.people?'・'+e.people+'人':'')+'</span>'+
        '<span class="m">軟化 '+fmt(e.m)+'m</span>'+
        '<span class="liq">液状化 '+fmt(e.liq)+'m</span></div>';
      if(e.memo) h+='<div class="memo">└ '+esc(e.memo)+'</div>';
      $('cardBody').innerHTML=h;
      $('sumM').textContent=fmt(e.m); $('sumLiq').textContent=fmt(e.liq);
    }else{
      $('cardBody').innerHTML='<div class="empty">この日の記録はありません</div>';
      $('sumM').textContent='0'; $('sumLiq').textContent='0';
    }
    var tm=0,tl=0;
    dates().forEach(function(d){tm+=Number(data[d].m||0);tl+=Number(data[d].liq||0)});
    $('totM').firstChild.nodeValue=fmt(tm);
    $('totLiq').firstChild.nodeValue=fmt(tl);
    var target=Number($('inTarget').value)||0;
    var pct=target?Math.min(100,tm/target*100):0;
    $('barFill').style.width=pct+'%';
    $('barText').textContent=fmt(tm)+'m ／ '+fmt(target)+'m（'+Math.round(pct)+'%）';
  }
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}

  $('btnAdd').onclick=function(){
    var d=$('inDate').value; if(!d){alert('日付を入れてください');return}
    if(data[d] && !confirm(md(d)+' は記録済みです。上書きしますか？')) return;
    data[d]={range:$('inRange').value.trim(), m:Number($('inM').value)||0,
      liq:Number($('inLiq').value)||0, people:Number($('inPpl').value)||0,
      memo:$('inMemo').value.trim()};
    save(data); cur=d;
    $('inRange').value='';$('inM').value='';$('inLiq').value='';$('inPpl').value='';$('inMemo').value='';
    render();
  };
  function step(dir){
    var ds=dates(); if(!ds.length)return;
    var i=ds.indexOf(cur);
    if(i===-1){cur=ds[ds.length-1]}
    else{cur=ds[Math.max(0,Math.min(ds.length-1,i+dir))]}
    render();
  }
  $('btnPrev').onclick=function(){step(-1)};
  $('btnNext').onclick=function(){step(1)};
  $('btnCopy').onclick=function(){
    var e=data[cur]; if(!e){alert('この日の記録がありません');return}
    var t='【バルコニー サッシ廻り】'+md(cur)+' '+(e.range||'')+
      ' 軟化'+fmt(e.m)+'m（うち液状化'+fmt(e.liq)+'m）'+(e.people?e.people+'人':'')+
      (e.memo?'／'+e.memo:'')+'\n有限会社石井商事｜撤去時実測';
    if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){alert('コピーしました')})}
    else{prompt('コピーしてください',t)}
  };
  $('inTarget').onchange=function(){lsSet(TKEY,$('inTarget').value);render()};
  render();
})();
</script>
</body>
</html>
